name: Build TWRP for Lenovo Smart Display 10 (blueberry)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    timeout-minutes: 360

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
          libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python3 openjdk-11-jdk python-is-python3
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo
        repo --version

    - name: Configure git
      run: |
        git config --global user.email "build@github.com"
        git config --global user.name "GitHub Actions"
        git config --global --add safe.directory '*'
        git config --global color.ui false

    - name: Init TWRP 8.1 manifest
      run: |
        mkdir -p twrp_source
        cd twrp_source
        repo init \
          -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git \
          -b twrp-8.1 --depth=1

    - name: Sync TWRP source
      run: |
        cd twrp_source
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: Fix roomservice.py for Python 3
      run: |
        ROOMSERVICE="twrp_source/vendor/omni/build/tools/roomservice.py"
        if [ -f "$ROOMSERVICE" ]; then
          sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/' "$ROOMSERVICE"
          echo "roomservice.py patched OK"
        else
          echo "roomservice.py not found at $ROOMSERVICE, skipping"
        fi

    - name: Copy device tree into source
      run: |
        mkdir -p twrp_source/device/lenovo/blueberry
        rsync -a \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='twrp_source' \
          ./ twrp_source/device/lenovo/blueberry/
        echo "=== Device tree contents ==="
        ls -la twrp_source/device/lenovo/blueberry/

    - name: Build TWRP recovery
      run: |
        cd twrp_source
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_blueberry-eng
        mka -j$(nproc) bootimage 2>&1 | tee /tmp/build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "=== Build exit code: $BUILD_EXIT ==="
        exit $BUILD_EXIT

    - name: Upload recovery image
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-blueberry-recovery
        path: |
          twrp_source/out/target/product/blueberry/boot.img
          twrp_source/out/target/product/blueberry/recovery.img
        if-no-files-found: warn
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        if-no-files-found: warn
        retention-days: 7
