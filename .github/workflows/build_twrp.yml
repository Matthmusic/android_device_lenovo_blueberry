name: Build TWRP for Lenovo Smart Display 10 (blueberry)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    timeout-minutes: 360

    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
          libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python3 openjdk-11-jdk python-is-python3
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Configure git
      run: |
        git config --global user.email "build@github.com"
        git config --global user.name "GitHub Actions"

    - name: Init TWRP 8.1 manifest
      run: |
        mkdir -p twrp_source && cd twrp_source
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git \
          -b twrp-8.1 --depth=1

    - name: Sync TWRP source
      run: |
        cd twrp_source
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: Fix roomservice.py for Python 3
      run: |
        cd twrp_source
        sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/' \
          vendor/omni/build/tools/roomservice.py

    - name: Fix Soong clang config for Ubuntu 22.04
      run: |
        cd twrp_source
        # Fix readonly variable error in Ubuntu 22.04 + TWRP 8.1
        find build/soong -name "*.go" | xargs grep -l "SOONG_CLANG_CONFIG" 2>/dev/null | head -5
        # Patch build/soong to remove the readonly assignment conflict
        if grep -r "SOONG_CLANG_CONFIG_arm_TARGET_TRIPLE" build/ 2>/dev/null | grep -q "readonly"; then
          find build/ -name "*.mk" -exec grep -l "SOONG_CLANG_CONFIG" {} \; | \
            xargs sed -i 's/^\s*readonly SOONG_CLANG_CONFIG/# readonly SOONG_CLANG_CONFIG/' 2>/dev/null || true
        fi

    - name: Copy device tree into source
      run: |
        mkdir -p twrp_source/device/lenovo/blueberry
        rsync -a --exclude='.git' --exclude='.github' --exclude='twrp_source' ./ twrp_source/device/lenovo/blueberry/
        ls twrp_source/device/lenovo/blueberry/

    - name: Build TWRP recovery
      run: |
        cd twrp_source
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_blueberry-eng
        mka -j$(nproc) bootimage 2>&1 | tee /tmp/build.log
        echo "Build exit: $?"

    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      with:
        name: twrp-blueberry-recovery
        path: |
          twrp_source/out/target/product/blueberry/boot.img
          twrp_source/out/target/product/blueberry/recovery.img
        if-no-files-found: warn
        retention-days: 30

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build.log
        retention-days: 7
