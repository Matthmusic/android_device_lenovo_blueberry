name: Build TWRP for Lenovo Smart Display 10 (blueberry)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4
      with:
        path: device/lenovo/blueberry

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
          libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python2 openjdk-11-jdk repo

    - name: Configure git
      run: |
        git config --global user.email "build@github.com"
        git config --global user.name "GitHub Actions"

    - name: Init TWRP manifest
      run: |
        mkdir twrp_source && cd twrp_source
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git \
          -b twrp-8.1 --depth=1
        # Fix roomservice.py Python 3 compatibility
        sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/' \
          .repo/manifests/../manifest.xml 2>/dev/null || true

    - name: Sync TWRP source
      run: |
        cd twrp_source
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: Fix roomservice.py for Python 3
      run: |
        cd twrp_source
        sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/' \
          vendor/omni/build/tools/roomservice.py || true

    - name: Copy device tree
      run: |
        cp -r device/lenovo/blueberry twrp_source/device/lenovo/blueberry

    - name: Download prebuilt kernel from device backup
      run: |
        # Le kernel est dans le repo, dans le dossier prebuilt
        ls twrp_source/device/lenovo/blueberry/prebuilt/

    - name: Build TWRP recovery
      run: |
        cd twrp_source
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_blueberry-eng
        mka bootimage -j$(nproc)

    - name: Upload recovery image
      uses: actions/upload-artifact@v4
      with:
        name: twrp-blueberry
        path: |
          twrp_source/out/target/product/blueberry/boot.img
          twrp_source/out/target/product/blueberry/recovery.img
        if-no-files-found: warn
        retention-days: 30
