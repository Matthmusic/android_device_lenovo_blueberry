name: Build TWRP for Lenovo Smart Display 10 (blueberry)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
          git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
          libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev python2 python-is-python2 openjdk-11-jdk
        # Installer repo
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Configure git
      run: |
        git config --global user.email "build@github.com"
        git config --global user.name "GitHub Actions"

    - name: Init TWRP 8.1 manifest
      run: |
        mkdir -p twrp_source && cd twrp_source
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git \
          -b twrp-8.1 --depth=1

    - name: Sync TWRP source
      run: |
        cd twrp_source
        repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: Fix roomservice.py for Python 3
      run: |
        cd twrp_source
        sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/' \
          vendor/omni/build/tools/roomservice.py

    - name: Copy device tree into source
      run: |
        mkdir -p twrp_source/device/lenovo/blueberry
        cp -r ./* twrp_source/device/lenovo/blueberry/ || true
        ls twrp_source/device/lenovo/blueberry/

    - name: Build TWRP recovery
      run: |
        cd twrp_source
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_blueberry-eng
        mka -j$(nproc) bootimage

    - name: Upload recovery (boot) image
      uses: actions/upload-artifact@v4
      with:
        name: twrp-blueberry-recovery
        path: |
          twrp_source/out/target/product/blueberry/boot.img
          twrp_source/out/target/product/blueberry/recovery.img
        if-no-files-found: warn
        retention-days: 30
